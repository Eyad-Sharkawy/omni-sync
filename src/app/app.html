<os-navbar/>
<main class="flex-1 px-8 py-9 bg-bg h-full">
  <div class="h-full grid grid-cols-[repeat(4,280px)] gap-5">
    <os-tasks-column columnType="todo">
      <h2 class="font-bold text-sm uppercase">To do</h2>
      <div body class="bg-surface2 border-border rounded-lg p-3.5 cursor-grab">
      </div>
    </os-tasks-column>

    <os-tasks-column columnType="inprog">
      <h2 class="font-bold text-sm uppercase">In progress</h2>
      <div body class="bg-surface2 border-border rounded-lg p-3.5 cursor-grab">
      </div>
    </os-tasks-column>

    <os-tasks-column columnType="review">
      <h2 class="font-bold text-sm uppercase">In progress</h2>
      <div body class="bg-surface2 border-border rounded-lg p-3.5 cursor-grab">
      </div>
    </os-tasks-column>

    <os-tasks-column columnType="done">
      <h2 class="font-bold text-sm uppercase">In progress</h2>
      <div body class="bg-surface2 border-border rounded-lg p-3.5 cursor-grab">
      </div>
    </os-tasks-column>
  </div>
</main>
