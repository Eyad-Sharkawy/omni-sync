<header class="flex justify-between items-center border-b-1 border-b-border pt-4 px-4.5 pb-3.5">
  <div class="flex items-center gap-2.5">
    <span [class]="'bg-' + columnType() + ' shadow-' + columnType()" class="block w-2 h-2 rounded-full"></span>
    <ng-content select="h2"/>
    <span class="block text-muted text-sm bg-surface3 rounded-2xl py-0.5 px-2 text-center">3</span>
  </div>

  <button title="Add Task"
          class="text-muted text-lg leading-4 py-0.5 px-1.5 rounded-md cursor-pointer hover:bg-surface3 hover:text-primary">
    +
  </button>
</header>

<div class="flex flex-col gap-2.5 p-3.5">
  <ng-content select="[body]"/>
</div>
