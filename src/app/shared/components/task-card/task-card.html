<div body class="bg-surface2 border-border cursor-grab rounded-lg p-3.5">
  <div class="mb-2.5 flex items-center gap-1.5">
    <span [class]="priorityBgClass[taskPriority()]" class="h-1.5 w-1.5 rounded-full"></span>

    <span
      [class]="priorityTextClass[taskPriority()]"
      class="text-[0.625rem] tracking-[1px] uppercase"
    >
      {{ taskPriority() }}
    </span>
  </div>

  <h4 class="mb-2.5 text-sm leading-[1.4] font-semibold">
    <ng-content select="Message" />
  </h4>

  <div class="mb-3 flex flex-wrap gap-1.5">
    <ng-content select="os-task-meta-tag" />
  </div>

  <div class="flex items-center justify-between">
    <p class="text-muted font-mono text-sm">
      <ng-content select="Date" />
    </p>
  </div>
</div>
