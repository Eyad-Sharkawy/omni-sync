<header class="flex justify-between items-center border-b-1 border-b-border pt-4 px-4.5 pb-3.5">
  <div class="flex items-center gap-2.5">
    <span [class]="headerSpanClasses[color()]" class="block w-2 h-2 rounded-full"></span>

    <h2 class="font-bold text-sm uppercase">
      <ng-content select="Header"/>
    </h2>

    <span class="block text-muted text-sm bg-surface3 rounded-2xl py-0.5 px-2 text-center">{{ numberOfTasks() }}</span>
  </div>

  <button title="Add Task"
          class="text-muted text-lg leading-4 py-0.5 px-1.5 rounded-md cursor-pointer hover:bg-surface3 hover:text-primary">
    +
  </button>
</header>

<div class="flex flex-1 flex-col gap-2.5 overflow-y-auto min-h-0 p-3.5">
  <ng-content select="os-task-card"/>
</div>

<div class="border-t border-border py-3 px-3.5">
  <button
    class="w-full border border-dashed border-border rounded-lg text-muted font-mono p-2.5 text-xs text-center cursor-pointer hover:bg-surface2 hover:border-muted hover:text-secondary">
    + Add a task
  </button>
</div>
